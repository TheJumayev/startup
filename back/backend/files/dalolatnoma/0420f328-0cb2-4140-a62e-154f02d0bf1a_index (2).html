<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D jismlar: Yuzi va Hajmi + 2D/3D animatsiya</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
            color: #eee;
        }
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(30, 30, 40, 0.9);
            backdrop-filter: blur(8px);
            padding: 20px 25px;
            border-radius: 16px;
            border: 1px solid #444;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 10;
            width: 350px;
            pointer-events: all;
            color: #f0f0f0;
        }
        #info-panel h2 {
            margin-top: 0;
            text-align: center;
            color: #ffaa00;
            border-bottom: 1px solid #555;
            padding-bottom: 10px;
        }
        #info-panel label {
            display: block;
            margin-top: 15px;
            font-weight: 500;
            color: #ccc;
        }
        #info-panel select, #info-panel input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            background: #222;
            border: 1px solid #555;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
        }
        #info-panel input:focus, #info-panel select:focus {
            outline: none;
            border-color: #ffaa00;
        }
        #input-container {
            margin: 15px 0;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .input-group {
            margin-bottom: 10px;
        }
        .input-group label {
            margin-top: 0;
            font-size: 0.9rem;
            color: #bbb;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #ffaa00;
            border: none;
            border-radius: 8px;
            color: #111;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
        }
        button:hover {
            background: #ffc34d;
        }
        button:active {
            transform: scale(0.98);
        }
        #results {
            margin-top: 20px;
            padding: 15px;
            background: #1e1e2a;
            border-radius: 12px;
            border-left: 4px solid #ffaa00;
        }
        #results p {
            margin: 8px 0;
            font-size: 1.1rem;
        }
        .result-value {
            font-weight: 700;
            color: #ffaa00;
        }
        #formula-display {
            background: #2a2a3a;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            border: 1px dashed #ffaa00;
            text-align: center;
        }
        #canvas-2d-container {
            position: absolute;
            bottom: 30px;
            left: 20px;
            width: 280px;
            height: 210px;
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(5px);
            border-radius: 16px;
            border: 1px solid #444;
            padding: 10px;
            z-index: 10;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
        }
        #canvas-2d-container h3 {
            margin: 0 0 8px 0;
            text-align: center;
            color: #ffaa00;
            font-size: 1rem;
        }
        #canvas2D {
            width: 100%;
            height: calc(100% - 25px);
            background: #1a1a24;
            border-radius: 8px;
            display: block;
        }
        #info-panel, #canvas-2d-container {
            user-select: none;
        }
        .unit-selector {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .unit-selector select {
            flex: 1;
        }
        @media (max-width: 700px) {
            #info-panel { width: 300px; padding: 15px; }
            #canvas-2d-container { width: 230px; height: 180px; }
        }
    </style>
</head>
<body>

    <!-- 3D canvas Three.js to'ldiradi -->
    <div id="canvas-container" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>

    <!-- Boshqaruv paneli (chap yuqori) -->
    <div id="info-panel">
        <h2>📐 3D Jismlar</h2>
        
        <label for="shape-select">Shaklni tanlang:</label>
        <select id="shape-select">
            <option value="cube">Kub</option>
            <option value="sphere">Shar</option>
            <option value="cylinder">Silindr</option>
            <option value="cone">Konus</option>
            <option value="pyramid">Piramida (asos: kvadrat)</option>
        </select>

        <label for="unit-select">Birlik:</label>
        <select id="unit-select">
            <option value="m" selected>metr (m)</option>
            <option value="cm">santimetr (cm)</option>
            <option value="mm">millimetr (mm)</option>
            <option value="in">dyuym (in)</option>
        </select>

        <div id="input-container">
            <!-- Dinamik inputlar shu yerga yoziladi -->
        </div>

        <button id="calculate-btn">Hisoblash va yangilash</button>

        <div id="results">
            <p>🔲 Yuzi: <span id="surface-area" class="result-value">—</span> <span id="unit-square"></span></p>
            <p>📦 Hajmi: <span id="volume" class="result-value">—</span> <span id="unit-cube"></span></p>
            <div id="formula-display">
                <!-- Formula shu yerda ko'rsatiladi -->
            </div>
        </div>
    </div>

    <!-- 2D canvas pastki chap -->
    <div id="canvas-2d-container">
        <h3>📐 2D ko'rinish</h3>
        <canvas id="canvas2D" width="300" height="180"></canvas>
    </div>

    <!-- Three.js kutubxonasi -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // --- Sozlash: Three.js sahna, kamera, renderer ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x11131f); // to'q ko'kish

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Yorug'lik
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(2, 5, 3);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 10;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 2;
        dirLight.shadow.camera.far = 20;
        scene.add(dirLight);

        const backLight = new THREE.PointLight(0x446688, 0.5);
        backLight.position.set(-3, 1, -3);
        scene.add(backLight);

        // Yordamchi panjara (ground)
        const gridHelper = new THREE.GridHelper(10, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.51;
        scene.add(gridHelper);

        // Ob'ektni saqlash uchun o'zgaruvchi
        let currentObject = null;

        // Boshqaruv (OrbitControls)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.5;
        controls.enableZoom = true;
        controls.maxPolarAngle = Math.PI / 2;

        // --- 2D Canvas elementi va kontekst ---
        const canvas2D = document.getElementById('canvas2D');
        const ctx2D = canvas2D.getContext('2d');

        // --- Dinamik inputlar va boshqa elementlar ---
        const shapeSelect = document.getElementById('shape-select');
        const unitSelect = document.getElementById('unit-select');
        const inputContainer = document.getElementById('input-container');
        const surfaceSpan = document.getElementById('surface-area');
        const volumeSpan = document.getElementById('volume');
        const unitSquareSpan = document.getElementById('unit-square');
        const unitCubeSpan = document.getElementById('unit-cube');
        const formulaDiv = document.getElementById('formula-display');
        const calculateBtn = document.getElementById('calculate-btn');

        // Shakllar uchun kerakli parametrlar
        const shapeParams = {
            cube: ['side'],
            sphere: ['radius'],
            cylinder: ['radius', 'height'],
            cone: ['radius', 'height'],
            pyramid: ['base_side', 'height']
        };

        // Parametrlar uchun o'zbekcha label
        const paramLabels = {
            side: 'Tomon (a)',
            radius: 'Radius (r)',
            height: 'Balandlik (h)',
            base_side: 'Asos tomoni (a)'
        };

        // Formulalar matni (HTML bilan)
        const shapeFormulas = {
            cube: 'S = 6a², V = a³',
            sphere: 'S = 4πr², V = (4/3)πr³',
            cylinder: 'S = 2πr(h + r), V = πr²h',
            cone: 'S = πr(r + √(r²+h²)), V = (1/3)πr²h',
            pyramid: 'S = a² + 2a√((a/2)²+h²), V = (1/3)a²h'
        };

        // Birlik kvadrat va kub belgilar
        function updateUnitSymbols() {
            const unit = unitSelect.value;
            let square = '', cube = '';
            switch(unit) {
                case 'm': square = 'm²'; cube = 'm³'; break;
                case 'cm': square = 'cm²'; cube = 'cm³'; break;
                case 'mm': square = 'mm²'; cube = 'mm³'; break;
                case 'in': square = 'in²'; cube = 'in³'; break;
                default: square = 'kv. birlik'; cube = 'kub birlik';
            }
            unitSquareSpan.textContent = square;
            unitCubeSpan.textContent = cube;
        }

        // Inputlarni yangilash
        function updateInputs() {
            const shape = shapeSelect.value;
            const params = shapeParams[shape];
            let html = '';
            params.forEach(p => {
                html += `<div class="input-group">
                    <label>${paramLabels[p]}:</label>
                    <input type="number" id="${p}" value="1.0" min="0.1" step="0.1">
                </div>`;
            });
            inputContainer.innerHTML = html;
            
            // Formulani yangilash
            formulaDiv.innerHTML = `<span style="color:#ffaa00;">📐 Formula:</span> ${shapeFormulas[shape]}`;
            
            // Eski obyektni tozalab, yangi shakl chiqarish (standart qiymatlar bilan)
            updateShapeAndResults();
        }

        // Hisoblash va 2D/3D yangilash
        function updateShapeAndResults() {
            const shape = shapeSelect.value;
            
            // Qiymatlarni o'qish
            let side = parseFloat(document.getElementById('side')?.value) || 1;
            let radius = parseFloat(document.getElementById('radius')?.value) || 1;
            let height = parseFloat(document.getElementById('height')?.value) || 1;
            let base_side = parseFloat(document.getElementById('base_side')?.value) || 1;

            // Minimal qiymat 0.1
            side = Math.max(0.1, side);
            radius = Math.max(0.1, radius);
            height = Math.max(0.1, height);
            base_side = Math.max(0.1, base_side);

            // Yuz va hajmni hisoblash
            let surface = 0, volume = 0;

            switch(shape) {
                case 'cube':
                    surface = 6 * side * side;
                    volume = side * side * side;
                    break;
                case 'sphere':
                    surface = 4 * Math.PI * radius * radius;
                    volume = (4/3) * Math.PI * radius * radius * radius;
                    break;
                case 'cylinder':
                    surface = 2 * Math.PI * radius * height + 2 * Math.PI * radius * radius;
                    volume = Math.PI * radius * radius * height;
                    break;
                case 'cone':
                    const slant = Math.sqrt(radius*radius + height*height);
                    surface = Math.PI * radius * (radius + slant);
                    volume = (1/3) * Math.PI * radius * radius * height;
                    break;
                case 'pyramid':
                    // kvadrat asosli piramida
                    const halfBase = base_side / 2;
                    const slantHeight = Math.sqrt(halfBase*halfBase + height*height);
                    surface = base_side*base_side + 2 * base_side * slantHeight;
                    volume = (1/3) * base_side * base_side * height;
                    break;
            }

            // Birlik belgilarini yangilash
            updateUnitSymbols();

            surfaceSpan.textContent = surface.toFixed(3);
            volumeSpan.textContent = volume.toFixed(3);

            // 3D obyektni yangilash
            update3DObject(shape, side, radius, height, base_side);

            // 2D chizmani yangilash
            draw2DShape(shape, side, radius, height, base_side);
        }

        // 3D obyekt yaratish/almashtirish
        function update3DObject(shape, side, radius, height, base_side) {
            if (currentObject) scene.remove(currentObject);

            let geometry, mesh;
            const mat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x331100, roughness: 0.3, metalness: 0.1, wireframe: false });
            
            switch(shape) {
                case 'cube':
                    geometry = new THREE.BoxGeometry(side, side, side);
                    mesh = new THREE.Mesh(geometry, mat);
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    const wireframeCube = new THREE.LineSegments(new THREE.EdgesGeometry(geometry), new THREE.LineBasicMaterial({ color: 0x88aaff }));
                    mesh.add(wireframeCube);
                    currentObject = mesh;
                    break;
                case 'sphere':
                    geometry = new THREE.SphereGeometry(radius, 32, 16);
                    mesh = new THREE.Mesh(geometry, mat);
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    currentObject = mesh;
                    break;
                case 'cylinder':
                    geometry = new THREE.CylinderGeometry(radius, radius, height, 32);
                    mesh = new THREE.Mesh(geometry, mat);
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    currentObject = mesh;
                    break;
                case 'cone':
                    geometry = new THREE.ConeGeometry(radius, height, 32);
                    mesh = new THREE.Mesh(geometry, mat);
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    currentObject = mesh;
                    break;
                case 'pyramid':
                    const pyramidRadius = base_side / Math.sqrt(2);
                    geometry = new THREE.CylinderGeometry(0, pyramidRadius, height, 4);
                    mesh = new THREE.Mesh(geometry, mat);
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    const edges = new THREE.EdgesGeometry(geometry);
                    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xaaccff }));
                    mesh.add(line);
                    currentObject = mesh;
                    break;
            }

            if (currentObject) {
                let lift = 0;
                if (shape === 'cube') lift = side/2;
                else if (shape === 'sphere') lift = radius;
                else if (shape === 'cylinder' || shape === 'cone' || shape === 'pyramid') lift = height/2;
                
                currentObject.position.y = lift;
                scene.add(currentObject);
            }
        }

        // 2D chizma (canvas 2D)
        function draw2DShape(shape, side, radius, height, base_side) {
            ctx2D.clearRect(0, 0, canvas2D.width, canvas2D.height);
            
            const w = canvas2D.width;
            const h = canvas2D.height;
            const cx = w / 2;
            const cy = h / 2;
            
            ctx2D.strokeStyle = '#ffaa00';
            ctx2D.lineWidth = 3;
            ctx2D.fillStyle = '#2a2a3a';
            ctx2D.setLineDash([]);
            
            switch(shape) {
                case 'cube': {
                    const s = Math.min(w * 0.3, h * 0.3, side * 20);
                    ctx2D.fillRect(cx - s/2, cy - s/2, s, s);
                    ctx2D.strokeRect(cx - s/2, cy - s/2, s, s);
                    ctx2D.font = 'bold 12px monospace';
                    ctx2D.fillStyle = '#ffaa00';
                    ctx2D.fillText(`a = ${side}`, cx - 20, cy - s/2 - 5);
                    break;
                }
                case 'sphere': {
                    const r = Math.min(w * 0.25, h * 0.25, radius * 20);
                    ctx2D.beginPath();
                    ctx2D.arc(cx, cy, r, 0, 2*Math.PI);
                    ctx2D.fill();
                    ctx2D.stroke();
                    ctx2D.font = 'bold 12px monospace';
                    ctx2D.fillStyle = '#ffaa00';
                    ctx2D.fillText(`r = ${radius}`, cx - 15, cy - r - 5);
                    break;
                }
                case 'cylinder': {
                    const r = Math.min(w * 0.15, h * 0.2, radius * 15);
                    const h2 = Math.min(h * 0.3, height * 15);
                    ctx2D.fillRect(cx - r, cy - h2/2, r*2, h2);
                    ctx2D.strokeRect(cx - r, cy - h2/2, r*2, h2);
                    ctx2D.beginPath();
                    ctx2D.ellipse(cx, cy - h2/2, r, r*0.3, 0, 0, 2*Math.PI);
                    ctx2D.stroke();
                    ctx2D.beginPath();
                    ctx2D.ellipse(cx, cy + h2/2, r, r*0.3, 0, 0, 2*Math.PI);
                    ctx2D.stroke();
                    ctx2D.font = 'bold 12px monospace';
                    ctx2D.fillStyle = '#ffaa00';
                    ctx2D.fillText(`r=${radius} h=${height}`, cx - 30, cy - h2/2 - 5);
                    break;
                }
                case 'cone': {
                    const r = Math.min(w * 0.2, h * 0.2, radius * 15);
                    const h2 = Math.min(h * 0.3, height * 15);
                    ctx2D.beginPath();
                    ctx2D.moveTo(cx - r, cy + h2/2);
                    ctx2D.lineTo(cx + r, cy + h2/2);
                    ctx2D.lineTo(cx, cy - h2/2);
                    ctx2D.closePath();
                    ctx2D.fill();
                    ctx2D.stroke();
                    ctx2D.beginPath();
                    ctx2D.ellipse(cx, cy + h2/2, r, r*0.2, 0, 0, 2*Math.PI);
                    ctx2D.stroke();
                    ctx2D.font = 'bold 12px monospace';
                    ctx2D.fillStyle = '#ffaa00';
                    ctx2D.fillText(`r=${radius} h=${height}`, cx - 30, cy - h2/2 - 5);
                    break;
                }
                case 'pyramid': {
                    const a = Math.min(w * 0.3, h * 0.2, base_side * 15);
                    const h2 = Math.min(h * 0.3, height * 15);
                    ctx2D.beginPath();
                    ctx2D.moveTo(cx - a/2, cy + h2/2);
                    ctx2D.lineTo(cx + a/2, cy + h2/2);
                    ctx2D.lineTo(cx, cy - h2/2);
                    ctx2D.closePath();
                    ctx2D.fill();
                    ctx2D.stroke();
                    ctx2D.strokeRect(cx - a/2, cy + h2/2 - 2, a, 4);
                    ctx2D.font = 'bold 12px monospace';
                    ctx2D.fillStyle = '#ffaa00';
                    ctx2D.fillText(`a=${base_side} h=${height}`, cx - 35, cy - h2/2 - 5);
                    break;
                }
            }
        }

        // Hodisalar
        shapeSelect.addEventListener('change', updateInputs);
        unitSelect.addEventListener('change', updateShapeAndResults); // birlik o'zgarganda natijalarni yangilash (belgilar uchun)
        calculateBtn.addEventListener('click', updateShapeAndResults);

        // Ilk yuklanish
        updateInputs();

        // Animatsiya tsikli
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Oyna o'lchami o'zgarganda
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 2D canvas o'lchamini moslash
        function resize2DCanvas() {
            const container = document.getElementById('canvas-2d-container');
            const canvas = document.getElementById('canvas2D');
            canvas.width = container.clientWidth - 20;
            canvas.height = container.clientHeight - 35;
            updateShapeAndResults();
        }
        window.addEventListener('resize', resize2DCanvas);
        resize2DCanvas();
    </script>
</body>
</html>
